<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>企业培训考试</title>
<style>:root{--pri:#1989fa;--bg:#f7f8fa;--card:#fff;--text:#323233;--sub:#969799;--bor:#ebedf0;--rad:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#0a0e1a,#1a2a4a)}
.login-card{width:100%;max-width:360px;background:var(--card);border-radius:16px;padding:32px 24px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-card h2{text-align:center;font-size:22px;margin-bottom:4px}
.login-card .sub{text-align:center;color:var(--sub);font-size:13px;margin-bottom:24px}
.login-card input{width:100%;padding:12px 14px;margin-bottom:12px;border:1.5px solid var(--bor);border-radius:var(--rad);font-size:15px;outline:none;transition:.2s}
.login-card input:focus{border-color:var(--pri)}
.login-card button{width:100%;padding:12px;background:var(--pri);color:#fff;border:none;border-radius:var(--rad);font-size:16px;font-weight:600;cursor:pointer}
.login-card button:active{opacity:.8}
.login-card .err{background:#fff0f0;color:#ee0a24;padding:10px;border-radius:8px;font-size:13px;margin-bottom:12px;text-align:center;display:none}
.login-card .hint{margin-top:16px;font-size:12px;color:var(--sub);text-align:center;line-height:1.8}
</style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <h2>📋 企业培训考试</h2>
    <div class="sub">叉车司机作业标准考核系统</div>
    <div class="err" id="loginErr">账号或密码错误</div>
    <form id="loginForm">
      <input name="username" placeholder="账号" autocomplete="off" required>
      <input name="password" type="password" placeholder="密码" required>
      <button type="submit">登 录</button>
    </form>
    <div class="hint">管理员 admin/admin123 · 主管 leader/123456 · 员工 zhuy/123456</div>
  </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit',async function(e){
  e.preventDefault();
  const fd=new FormData(this);
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:fd.get('username'),password:fd.get('password')})});
    const d=await r.json();
    if(d.code!==200){document.getElementById('loginErr').style.display='block';return}
    document.cookie='token='+d.data.token+';max-age=604800;path=/';
    location.href='/app';
  }catch(e){document.getElementById('loginErr').style.display='block'}
});
</script>
</body>
</html>
