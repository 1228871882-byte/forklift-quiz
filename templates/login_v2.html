<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>企业培训考试系统</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#0f172a,#1e293b);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
.login-card{background:#fff;border-radius:16px;padding:2.5rem 2rem;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:380px;width:100%}
</style>
</head>
<body class="min-vh-100 d-flex align-items-center justify-content-center p-3">
<div class="login-card">
  <div class="text-center mb-4">
    <div class="fs-1 mb-2">📋</div>
    <h5 class="fw-bold">企业培训考试系统</h5>
    <small class="text-muted">叉车司机作业标准考核</small>
  </div>
  <form action="/api/auth/login" method="post" id="loginForm" onsubmit="doLogin(event)">
    <div class="mb-3"><input name="username" class="form-control form-control-lg rounded-3" placeholder="账号" autocomplete="off" required></div>
    <div class="mb-3"><input name="password" type="password" class="form-control form-control-lg rounded-3" placeholder="密码" required></div>
    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 fw-bold">登 录</button>
  </form>
  <div class="text-center mt-3"><small class="text-muted">admin/admin123 · leader/123456 · zhuy/123456</small></div>
  <div class="alert alert-danger py-2 mt-3 d-none" id="err">账号或密码错误</div>
</div>
<script>
async function doLogin(e){
  e.preventDefault();
  const fd=new FormData(e.target);
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:fd.get('username'),password:fd.get('password')})});
    const d=await r.json();
    if(d.code!==200){document.getElementById('err').classList.remove('d-none');return}
    document.cookie='token='+d.data.token+';max-age=604800;path=/';
    location.href='/app';
  }catch(e){document.getElementById('err').classList.remove('d-none')}
}
</script>
</body>
</html>
